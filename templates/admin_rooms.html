<link rel="stylesheet" href="/static/style.css">

<!-- TOP BAR -->
<div class="top-bar">
    <h1>Room Control (Admin)</h1>

    <div class="top-buttons">
        <a href="/admin/dashboard">
            <button class="small-btn logout-btn">Back</button>
        </a>
    </div>
</div>

<table>

<tr>
<th>Room</th>
<th>Capacity</th>
<th>Total Rooms</th>
<th>Available</th>
<th>Edit</th>
</tr>

{% for room in info %}
<tr>

<td>{{room}}</td>
<td>{{info[room]["capacity"]}}</td>
<td>{{info[room]["total_rooms"]}}</td>
<td>{{availability[room]}}</td>

<td>
<form method="POST">
<input type="hidden" name="room" value="{{room}}">
<input name="total" placeholder="New total" required>
<button>Update</button>
</form>
</td>

</tr>
{% endfor %}

</table>
