<link rel="stylesheet" href="/static/style.css">

<div class="card">

<h2>Receipt</h2>

<p>ID: {{id}}</p>
<p>Room: {{data[0]}}</p>
<p>Date: {{data[1]}}</p>
<p>Time: {{data[2]}} - {{data[3]}}</p>
<p>Hours: {{data[4]}}</p>
<p>Total: $ {{data[5]}}</p>
<p>Payment: {{data[6]}}</p>
<p>Status: {{data[7]}}</p>

<button onclick="window.print()">Print</button>

</div>
